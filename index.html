<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="public/bootstrap/bootstrap.min.css">
        <link rel="stylesheet" href="public/css/login.css">
    <title>Login de usuario</title>
</head>
<body>
    <div class="wrapper fadeInDown">
  <div id="formContent">
    <!-- Tabs Titles -->
    <!-- Icon -->
    <div class="fadeIn first">
      <img src="public/img/logo.png" id="icon" alt="User Icon" />
      <h1>HELP-DESK</h1>
    </div>
    <!-- Login Form -->
    <form id="frmLogin" method="POST" onsubmit="return loginUsuario()">
      <input type="text" id="login" class="fadeIn second" name="login" placeholder="username" required>
      <input type="password" id="password" class="fadeIn third" name="password" placeholder="password" required>
      <input type="submit" class="fadeIn fourth" value="Entrar">
    </form>
    <!-- Remind Passowrd -->
    <div id="formFooter">
      <a class="underlineHover" href="#" data-bs-toggle="modal" data-bs-target="#exampleModal">Contacta con el administrador</a>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Contacto</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Si no tienes una crnedencial contacta al admisntrador 556574623136
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<script src="public/jquery/jquery-3.7.1.min.js"></script>
<script src="public/bootstrap/bootstrap.bundle.min.js"></script>
<script src="public/sweetalert2/sweetalert2@11.js"></script>

<script src="public/js/usuarios/login.js"></script>
</body>
</html>
